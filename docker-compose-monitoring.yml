services:
  prometheus:
    image: prom/prometheus:latest
    container_name: bondtradex-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:latest
    container_name: bondtradex-grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus